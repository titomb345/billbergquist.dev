[build]
  command = "npm run build"
  publish = "dist"

# Redirect /sitemap.xml to Astro's generated sitemap index
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301

# Redirect old /projects URL to /portfolio
[[redirects]]
  from = "/projects"
  to = "/portfolio"
  status = 301

[[redirects]]
  from = "/projects/"
  to = "/portfolio/"
  status = 301

# Serve the retro page for /retro/<roomcode> paths (clean URLs)
[[redirects]]
  from = "/retro/:code"
  to = "/retro/index.html"
  status = 200

# Serve the craps page for /craps/<roomcode> paths (clean URLs)
[[redirects]]
  from = "/craps/:code"
  to = "/craps/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://static.cloudflareinsights.com https://*.clerk.accounts.dev; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://cloudflareinsights.com https://www.googleapis.com https://*.clerk.accounts.dev https://*.clerk.dev https://realtime-worker.billbergquist.workers.dev wss://realtime-worker.billbergquist.workers.dev; frame-src 'self' https://*.clerk.accounts.dev"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
