[build]
  command = "npm run build"
  publish = "dist"

# Serve the retro page for /retro/<roomcode> paths (clean URLs)
[[redirects]]
  from = "/retro/:code"
  to = "/retro/index.html"
  status = 200

# Serve the craps page for /craps/<roomcode> paths (clean URLs)
[[redirects]]
  from = "/craps/:code"
  to = "/craps/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
