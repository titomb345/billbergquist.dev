<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <radialGradient id="bgGrad" cx="55%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#161625"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <!-- Orange ambient for CTA area -->
    <radialGradient id="ambientOrange" cx="50%" cy="82%" r="35%">
      <stop offset="0%" stop-color="#f06418" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f06418" stop-opacity="0"/>
    </radialGradient>
    <filter id="orangeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" fill="url(#bgGrad)"/>
  <rect width="1050" height="600" fill="url(#ambientOrange)"/>

  <!-- Dot grid -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#ffffff"/>
    </pattern>
    <rect width="1050" height="600" fill="url(#dots)"/>
  </g>

  <!-- Thin border inset (matching front) -->
  <rect x="28" y="28" width="994" height="544" rx="2" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Terminal prompt decoration (top-left) -->
  <g transform="translate(72, 60)">
    <text fill="#00c9a7" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" opacity="0.4">~/contact</text>
  </g>

  <!-- Contact info — clean vertical stack with mint labels -->
  <g transform="translate(72, 120)">
    <!-- Phone -->
    <text fill="#00c9a7" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="2" opacity="0.6">PHONE</text>
    <text y="30" fill="#ffffff" font-family="'Space Grotesk', Arial, sans-serif" font-size="22" font-weight="500">(847) 280-0729</text>

    <!-- Email -->
    <text y="80" fill="#00c9a7" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="2" opacity="0.6">EMAIL</text>
    <text y="110" fill="#ffffff" font-family="'Space Grotesk', Arial, sans-serif" font-size="22" font-weight="500">services@billbergquist.dev</text>

    <!-- Website -->
    <text y="160" fill="#00c9a7" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="2" opacity="0.6">WEB</text>
    <text y="190" fill="#ffffff" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="22" font-weight="500">billbergquist.dev</text>
  </g>

  <!-- Small chevron mark — right side, vertically centered -->
  <g transform="translate(780, 170) scale(0.28)" opacity="0.07">
    <polygon points="96,136 96,180 276,264 96,348 96,392 328,264" fill="#00c9a7"/>
    <rect x="272" y="340" width="152" height="44" rx="4" fill="#f06418"/>
  </g>

  <!-- Divider -->
  <rect x="72" y="420" width="906" height="1" fill="#ffffff" opacity="0.05"/>

  <!-- Free audit CTA — the money shot -->
  <g transform="translate(72, 448)">
    <!-- Orange glow behind -->
    <rect x="0" y="0" width="906" height="80" rx="6" fill="#f06418" opacity="0.04" filter="url(#orangeGlow)"/>
    <!-- Border -->
    <rect x="0" y="0" width="906" height="80" rx="6" fill="none" stroke="#f06418" stroke-width="1" opacity="0.35"/>
    <!-- Left orange accent bar -->
    <rect x="0" y="20" width="3" height="40" rx="1.5" fill="#f06418" opacity="0.8"/>
    <!-- CTA text -->
    <text x="28" y="38" fill="#f06418" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="14" font-weight="700" letter-spacing="2">FREE WEBSITE AUDIT</text>
    <text x="28" y="60" fill="#b0b0c0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14">billbergquist.dev/free-site-audit</text>
    <!-- Arrow -->
    <text x="870" y="48" fill="#f06418" font-family="'Space Grotesk', Arial, sans-serif" font-size="22" text-anchor="end" opacity="0.6">&#8594;</text>
  </g>

  <!-- Noise overlay -->
  <rect width="1050" height="600" fill="transparent" filter="url(#noise)" opacity="0.03"/>
</svg>
